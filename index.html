<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Airline PNR App</title>

<style>
body{
    font-family:'Segoe UI',sans-serif;
    margin:0;
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* APP CONTAINER */
.app{
    width:380px;
    background:#111827;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
    color:white;
}

/* HEADER */
.header{
    background:linear-gradient(135deg,#2563eb,#1d4ed8);
    padding:15px;
    text-align:center;
}

.header h2{
    margin:0;
    font-size:18px;
}

.header p{
    margin:5px 0 0;
    font-size:12px;
    opacity:0.9;
}

/* CONTENT */
.content{
    padding:15px;
}

/* DESCRIPTION */
.desc{
    font-size:12px;
    opacity:0.8;
    margin-bottom:10px;
}

/* INPUT */
input{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:none;
    outline:none;
    margin-top:8px;
    background:#1f2937;
    color:white;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    margin-top:10px;
    background:#22c55e;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

/* STATUS CARD */
.status-card{
    margin-top:15px;
    padding:10px;
    border-radius:10px;
    text-align:center;
    font-weight:bold;
    display:none;
}

.success{background:#16a34a;}
.pending{background:#f59e0b;}

/* TICKET */
.ticket{
    margin-top:15px;
    background:#1f2937;
    border-radius:12px;
    overflow:hidden;
    display:none;
}

/* ROUTE */
.route{
    text-align:center;
    padding:10px;
}

.route h3{
    margin:0;
}

.route small{
    opacity:0.7;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    padding:10px;
    font-size:13px;
}

.box{
    background:#111827;
    padding:8px;
    border-radius:8px;
}

.label{
    font-size:11px;
    opacity:0.6;
}

/* NOTE */
.note{
    background:#0b1220;
    padding:10px;
    font-size:11px;
    border-top:1px solid #374151;
}

/* NOTIF */
#notif{
    position:fixed;
    top:15px;
    right:15px;
    padding:10px 15px;
    border-radius:8px;
    color:white;
    display:none;
}

.ok{background:#22c55e;}
.err{background:#ef4444;}
</style>
</head>

<body>

<div class="app">

    <!-- HEADER -->
    <div class="header">
        <h2>✈️ Airline PNR System</h2>
        <p>Check booking, flight status & ticket info</p>
    </div>

    <div class="content">

        <!-- DESCRIPTION -->
        <div class="desc">
            Sistem ini digunakan untuk mengecek status tiket penerbangan, data penumpang, dan informasi keberangkatan secara real-time.
        </div>

        <input type="text" id="pnr" placeholder="Enter PNR Code">
        <button onclick="cekPNR()">Search Ticket</button>

        <!-- STATUS -->
        <div class="status-card" id="statusCard"></div>

        <!-- TICKET -->
        <div class="ticket" id="ticket">

            <div class="route">
                <h3 id="rute"></h3>
                <small id="jam"></small>
            </div>

            <div class="grid">

                <div class="box">
                    <div class="label">Passenger</div>
                    <div id="nama"></div>
                </div>

                <div class="box">
                    <div class="label">Seat</div>
                    <div id="seat"></div>
                </div>

                <div class="box">
                    <div class="label">Gate</div>
                    <div id="gate"></div>
                </div>

                <div class="box">
                    <div class="label">Class</div>
                    <div id="kelas"></div>
                </div>

                <div class="box">
                    <div class="label">E-Ticket</div>
                    <div id="eticket"></div>
                </div>

                <div class="box">
                    <div class="label">PNR</div>
                    <div id="kode"></div>
                </div>

            </div>

            <div class="note" id="note"></div>

        </div>

    </div>
</div>

<div id="notif"></div>

<!-- SOUND -->
<audio id="clickSound" src="https://actions.google.com/sounds/v1/ui/click.ogg"></audio>
<audio id="okSound" src="https://actions.google.com/sounds/v1/ambiences/airport.ogg"></audio>
<audio id="errSound" src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"></audio>

<script>
const dataPNR={
    "QWIT24":{
        nama:"Abdul kamis key toka","Fitria Kartika
        rute:"MAKASSAR (UPG)→ TERNATE (TTE)",
        jam:"06:25AM",
        gate:"gate 3",
        seat:"12A,12B",
        kelas:"Economy",
        eticket:"698-3945274215",
        status:"confirmed"
    },
    "XYZ789":{
        nama:"Rani",
        rute:"SUB → UPG",
        jam:"15:30 WIB",
        gate:"B7",
        seat:"7B",
        kelas:"Business",
        eticket:"ETK-112233",
        status:"BOARDING SOON"
    }
};

function sound(id){
    let a=document.getElementById(id);
    a.currentTime=0;
    a.play().catch(()=>{});
}

function notif(text,type){
    let n=document.getElementById("notif");
    n.innerText=text;
    n.className=type==="ok"?"ok":"err";
    n.style.display="block";
    setTimeout(()=>n.style.display="none",2000);
}

function cekPNR(){
    sound("clickSound");

    let pnr=document.getElementById("pnr").value.toUpperCase();
    let ticket=document.getElementById("ticket");
    let statusCard=document.getElementById("statusCard");

    if(dataPNR[pnr]){
        let d=dataPNR[pnr];

        document.getElementById("nama").innerText=d.nama;
        document.getElementById("rute").innerText=d.rute;
        document.getElementById("jam").innerText=d.jam;
        document.getElementById("gate").innerText=d.gate;
        document.getElementById("seat").innerText=d.seat;
        document.getElementById("kelas").innerText=d.kelas;
        document.getElementById("eticket").innerText=d.eticket;
        document.getElementById("kode").innerText=pnr;

        ticket.style.display="block";

        statusCard.style.display="block";
        statusCard.innerText=d.status;
        statusCard.className="status-card success";

        document.getElementById("note").innerText=
        "Please arrive at the gate 90 minutes before departure.";

        sound("okSound");
        notif("PNR Found","ok");

    }else{
        ticket.style.display="none";
        statusCard.style.display="none";
        sound("errSound");
        notif("PNR Not Found","err");
    }
}
</script>

</body>
</html>
