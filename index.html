<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PNR Check</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Glass Card */
.card {
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 25px;
    width: 350px;
    color: white;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
}

h2 {
    text-align: center;
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    margin-bottom: 10px;
    outline: none;
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #00c6ff;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #0072ff;
}

/* Ticket Style */
.ticket {
    margin-top: 20px;
    background: white;
    color: black;
    border-radius: 15px;
    overflow: hidden;
    display: none;
    animation: fade 0.5s ease;
}

@keyframes fade {
    from {opacity: 0; transform: translateY(10px);}
    to {opacity: 1; transform: translateY(0);}
}

.ticket-header {
    background: #0072ff;
    color: white;
    padding: 15px;
    text-align: center;
    font-weight: bold;
}

.ticket-body {
    padding: 15px;
}

.row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
}

.status {
    text-align: center;
    padding: 10px;
    font-weight: bold;
}

.pending { color: orange; }
.success { color: green; }

.loading {
    text-align: center;
    display: none;
    margin-top: 10px;
}

.dot {
    height: 8px;
    width: 8px;
    background: white;
    border-radius: 50%;
    display: inline-block;
    animation: blink 1.4s infinite both;
}

.dot:nth-child(2){ animation-delay: .2s;}
.dot:nth-child(3){ animation-delay: .4s;}

@keyframes blink {
    0%,80%,100% {opacity: 0;}
    40% {opacity: 1;}
}

.countdown {
    text-align: center;
    color: red;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="card">
    <h2>✈️ Check PNR</h2>

    <input type="text" id="pnr" placeholder="Masukkan kode PNR">
    <button onclick="cekPNR()">Cek Tiket</button>

    <div class="loading" id="loading">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
    </div>

    <div class="ticket" id="ticket">
        <div class="ticket-header">E-TICKET</div>
        <div class="ticket-body">
            <div class="row"><span>Nama</span><span id="nama"></span></div>
            <div class="row"><span>Rute</span><span id="rute"></span></div>
            <div class="row"><span>Jam</span><span id="jam"></span></div>
            <div class="row"><span>Seat</span><span id="seat"></span></div>
            <div class="row"><span>Class</span><span id="kelas"></span></div>
            <div class="row"><span>E-Ticket</span><span id="eticket"></span></div>
        </div>
        <div class="status" id="status"></div>
        <div class="countdown" id="countdown"></div>
    </div>
</div>

<script>
const dataPNR = {
    "ABC123": {
        nama: "Akbar Ramadhan",
        rute: "Jakarta → Bali",
        jam: "10:00 WIB",
        seat: "12A",
        kelas: "Economy",
        eticket: "ETK-998877",
        status: "Belum Dibayar",
        deadline: "2026-04-20T23:59:00"
    },
    "XYZ789": {
        nama: "Rani Putri",
        rute: "Surabaya → Makassar",
        jam: "15:30 WIB",
        seat: "7B",
        kelas: "Business",
        eticket: "ETK-112233",
        status: "Sukses",
        deadline: null
    }
};

let timer;

function cekPNR() {
    const pnr = document.getElementById("pnr").value.toUpperCase();
    const loading = document.getElementById("loading");
    const ticket = document.getElementById("ticket");

    ticket.style.display = "none";
    loading.style.display = "block";

    setTimeout(() => {
        loading.style.display = "none";

        if (dataPNR[pnr]) {
            const d = dataPNR[pnr];

            document.getElementById("nama").innerText = d.nama;
            document.getElementById("rute").innerText = d.rute;
            document.getElementById("jam").innerText = d.jam;
            document.getElementById("seat").innerText = d.seat;
            document.getElementById("kelas").innerText = d.kelas;
            document.getElementById("eticket").innerText = d.eticket;

            const statusEl = document.getElementById("status");
            statusEl.innerText = d.status;
            statusEl.className = "status " + (d.status === "Sukses" ? "success" : "pending");

            ticket.style.display = "block";

            if (timer) clearInterval(timer);

            if (d.deadline) startCountdown(d.deadline);
            else document.getElementById("countdown").innerText = "";

        } else {
            alert("PNR tidak ditemukan!");
        }
    }, 1200);
}

function startCountdown(deadline) {
    const el = document.getElementById("countdown");

    timer = setInterval(() => {
        const now = new Date().getTime();
        const end = new Date(deadline).getTime();
        const diff = end - now;

        if (diff <= 0) {
            el.innerText = "Waktu pembayaran habis!";
            clearInterval(timer);
            return;
        }

        const h = Math.floor(diff / (1000 * 60 * 60));
        const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const s = Math.floor((diff % (1000 * 60)) / 1000);

        el.innerText = `Batas bayar: ${h}j ${m}m ${s}d`;
    }, 1000);
}
</script>

</body>
</html>
