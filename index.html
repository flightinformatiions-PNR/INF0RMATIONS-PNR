<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cek PNR</title>

<style>
body{
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* Card */
.card{
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(10px);
    padding:20px;
    border-radius:15px;
    width:360px;
    text-align:center;
    color:white;
    box-shadow:0 8px 25px rgba(0,0,0,0.3);
}

input,button{
    width:100%;
    padding:10px;
    border-radius:8px;
    border:none;
    margin-top:10px;
}

button{
    background:#00c6ff;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

/* Ticket */
.ticket{
    margin-top:20px;
    background:white;
    border-radius:12px;
    overflow:hidden;
    display:none;
    animation:fade 0.4s ease;
}

@keyframes fade{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
}

.ticket-header{
    background:#0072ff;
    color:white;
    padding:12px;
    display:flex;
    justify-content:space-between;
    font-weight:bold;
}

.ticket-body{
    padding:15px;
    color:black;
}

.route{
    text-align:center;
    margin-bottom:10px;
}

.route h3{
    margin:0;
    font-size:20px;
}

.route small{
    color:gray;
}

/* Divider */
.divider{
    border-top:2px dashed #ccc;
    margin:12px 0;
}

/* Grid */
.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    font-size:14px;
}

.label{
    color:gray;
    font-size:12px;
}

/* Status */
.status{
    text-align:center;
    padding:10px;
    font-weight:bold;
}

.success{color:green;}
.pending{color:orange;}

/* Note */
.note{
    background:#f9f9f9;
    padding:10px;
    font-size:12px;
    border-top:1px solid #ddd;
}

/* Notif */
#notif{
    position:fixed;
    top:20px;
    right:20px;
    padding:12px 18px;
    border-radius:8px;
    color:white;
    display:none;
    z-index:999;
}

.successNotif{background:#28a745;}
.errorNotif{background:#dc3545;}
</style>
</head>

<body>

<div class="card">
    <h2>✈️ Cek PNR</h2>

    <input type="text" id="pnr" placeholder="Masukkan kode PNR">
    <button onclick="cekPNR()">Cek Tiket</button>

    <div class="ticket" id="ticket">
        <div class="ticket-header">
            <span>BOARDING PASS</span>
            <span id="kode"></span>
        </div>

        <div class="ticket-body">
            <div class="route">
                <h3 id="rute"></h3>
                <small id="jam"></small>
            </div>

            <div class="divider"></div>

            <div class="grid">
                <div><div class="label">Nama</div><div id="nama"></div></div>
                <div><div class="label">Seat</div><div id="seat"></div></div>
                <div><div class="label">Gate</div><div id="gate"></div></div>
                <div><div class="label">Class</div><div id="kelas"></div></div>
                <div><div class="label">E-Ticket</div><div id="eticket"></div></div>
            </div>

            <div class="divider"></div>

            <div class="status" id="status"></div>
            <div class="note" id="note"></div>
        </div>
    </div>
</div>

<div id="notif"></div>

<!-- 🔊 SOUND -->
<audio id="clickSound" src="https://actions.google.com/sounds/v1/ui/click.ogg"></audio>

<!-- ✈️ SUARA BANDARA (lebih halus) -->
<audio id="okSound" src="https://actions.google.com/sounds/v1/ambiences/airport.ogg"></audio>

<audio id="errSound" src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"></audio>

<script>
const dataPNR={
    "JKUTZG":{
        nama:"LAUPE",
        rute:"CGK → DPS",
        jam:"10:00 WIB",
        gate:"A12",
        seat:"12A",
        kelas:"Economy",
        eticket:"ETK-998877",
        status:"Sukses"
    },
    "XYZ789":{
        nama:"Rani",
        rute:"SUB → UPG",
        jam:"15:30 WIB",
        gate:"B7",
        seat:"7B",
        kelas:"Business",
        eticket:"ETK-112233",
        status:"Sukses"
    }
};

function sound(id){
    let a=document.getElementById(id);
    a.currentTime=0;
    a.play().catch(()=>{});
}

function showNotif(text,type){
    let n=document.getElementById("notif");
    n.innerText=text;
    n.className=(type==="success"?"successNotif":"errorNotif");
    n.style.display="block";
    setTimeout(()=>{n.style.display="none";},2000);
}

function cekPNR(){
    sound("clickSound");

    let pnr=document.getElementById("pnr").value.toUpperCase();
    let ticket=document.getElementById("ticket");

    if(dataPNR[pnr]){
        let d=dataPNR[pnr];

        document.getElementById("kode").innerText=pnr;
        document.getElementById("nama").innerText=d.nama;
        document.getElementById("rute").innerText=d.rute;
        document.getElementById("jam").innerText=d.jam;
        document.getElementById("gate").innerText=d.gate;
        document.getElementById("seat").innerText=d.seat;
        document.getElementById("kelas").innerText=d.kelas;
        document.getElementById("eticket").innerText=d.eticket;

        let status=document.getElementById("status");
        let note=document.getElementById("note");

        status.innerText=d.status;
        status.className="status "+(d.status==="Sukses"?"success":"pending");

        if(d.status==="Sukses"){
            note.innerText="Tiket sudah dibayar. Silakan menuju gate sebelum boarding.";
        }else{
            note.innerText="Tiket belum dibayar. Segera lakukan pembayaran sebelum batas waktu.";
        }

        ticket.style.display="block";

        // ✈️ suara bandara
        sound("okSound");

        showNotif("Data ditemukan","success");

    }else{
        ticket.style.display="none";
        sound("errSound");
        showNotif("PNR tidak ditemukan","error");
    }
}
</script>

</body>
</html>
