<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PNR Check</title>

<style>
body{
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

/* Card */
.card{
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(10px);
    padding:20px;
    border-radius:15px;
    width:330px;
    box-shadow:0 8px 25px rgba(0,0,0,0.3);
    text-align:center;
}

h2{margin-bottom:15px;}

input{
    width:100%;
    padding:10px;
    border-radius:8px;
    border:none;
    margin-bottom:10px;
}

button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#00c6ff;
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#0072ff;
}

/* Ticket */
.ticket{
    margin-top:15px;
    background:white;
    color:black;
    border-radius:12px;
    overflow:hidden;
    display:none;
    animation:fade 0.4s ease;
}

@keyframes fade{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
}

.header{
    background:#0072ff;
    color:white;
    padding:10px;
    font-weight:bold;
}

.body{
    padding:12px;
    text-align:left;
}

.row{
    display:flex;
    justify-content:space-between;
    font-size:14px;
    margin:5px 0;
}

.status{
    text-align:center;
    padding:8px;
    font-weight:bold;
}

.success{color:green;}
.pending{color:orange;}
</style>
</head>

<body>

<div class="card">
    <h2>✈️ Cek PNR</h2>

    <input type="text" id="pnr" placeholder="Masukkan kode PNR">
    <button onclick="cekPNR()">Cek Tiket</button>

    <div class="ticket" id="ticket">
        <div class="header">E-TICKET</div>
        <div class="body">
            <div class="row"><span>Nama</span><span id="nama"></span></div>
            <div class="row"><span>Rute</span><span id="rute"></span></div>
            <div class="row"><span>Seat</span><span id="seat"></span></div>
        </div>
        <div class="status" id="status"></div>
    </div>
</div>

<!-- 🔊 SOUND SIMPLE -->
<audio id="clickSound" src="https://actions.google.com/sounds/v1/ui/click.ogg"></audio>
<audio id="okSound" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>
<audio id="errSound" src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"></audio>

<script>
const dataPNR={
    "ABC123":{
        nama:"Akbar",
        rute:"Jakarta → Bali",
        seat:"12A",
        status:"Belum Dibayar"
    },
    "XYZ789":{
        nama:"Rani",
        rute:"Surabaya → Makassar",
        seat:"7B",
        status:"Sukses"
    }
};

function sound(id){
    let a=document.getElementById(id);
    a.currentTime=0;
    a.play().catch(()=>{});
}

function cekPNR(){
    sound("clickSound");

    let pnr=document.getElementById("pnr").value.toUpperCase();
    let ticket=document.getElementById("ticket");

    if(dataPNR[pnr]){
        let d=dataPNR[pnr];

        document.getElementById("nama").innerText=d.nama;
        document.getElementById("rute").innerText=d.rute;
        document.getElementById("seat").innerText=d.seat;

        let status=document.getElementById("status");
        status.innerText=d.status;
        status.className="status "+(d.status==="Sukses"?"success":"pending");

        ticket.style.display="block";
        sound("okSound");

    }else{
        ticket.style.display="none";
        sound("errSound");
        alert("PNR tidak ditemukan");
    }
}
</script>

</body>
</html>
