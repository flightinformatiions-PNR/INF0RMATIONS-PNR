<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PNR Check Pro</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#141e30,#243b55);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.card{
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(12px);
    padding:20px;
    border-radius:20px;
    width:360px;
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

h2{text-align:center;}

input{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:none;
    margin:10px 0;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#00c6ff;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.ticket{
    margin-top:15px;
    background:white;
    color:black;
    border-radius:15px;
    display:none;
    overflow:hidden;
}

.header{
    background:#0072ff;
    color:white;
    padding:12px;
    text-align:center;
    font-weight:bold;
}

.body{padding:12px;}

.row{
    display:flex;
    justify-content:space-between;
    font-size:14px;
    margin:4px 0;
}

.status{
    text-align:center;
    padding:10px;
    font-weight:bold;
}

.pending{color:orange;}
.success{color:green;}

.countdown{
    text-align:center;
    color:red;
    font-size:13px;
}
</style>
</head>

<body>

<div class="card">
    <h2>✈️ Check PNR</h2>

    <input type="text" id="pnr" placeholder="Masukkan kode PNR">
    <button onclick="cekPNR()">Cek Tiket</button>

    <div class="ticket" id="ticket">
        <div class="header">BOARDING PASS</div>
        <div class="body">
            <div class="row"><span>Nama</span><span id="nama"></span></div>
            <div class="row"><span>PNR</span><span id="kode"></span></div>
            <div class="row"><span>Rute</span><span id="rute"></span></div>
            <div class="row"><span>Gate</span><span id="gate"></span></div>
            <div class="row"><span>Boarding</span><span id="boarding"></span></div>
            <div class="row"><span>Seat</span><span id="seat"></span></div>
            <div class="row"><span>Class</span><span id="kelas"></span></div>
            <div class="row"><span>E-Ticket</span><span id="eticket"></span></div>
        </div>
        <div class="status" id="status"></div>
        <div class="countdown" id="countdown"></div>
    </div>
</div>

<!-- AUDIO LOCAL (WAJIB biar bunyi stabil) -->
<audio id="clickSound" src="sound/click.mp3"></audio>
<audio id="successSound" src="sound/success.mp3"></audio>
<audio id="errorSound" src="sound/error.mp3"></audio>

<script>
const dataPNR={
    "ABC123":{
        nama:"Akbar Ramadhan",
        rute:"CGK → DPS",
        gate:"A12",
        boarding:"09:30",
        seat:"12A",
        kelas:"Economy",
        eticket:"ETK-998877",
        status:"Belum Dibayar",
        deadline:"2026-04-20T23:59:00"
    },
    "XYZ789":{
        nama:"Rani Putri",
        rute:"SUB → UPG",
        gate:"B7",
        boarding:"15:00",
        seat:"7B",
        kelas:"Business",
        eticket:"ETK-112233",
        status:"Sukses",
        deadline:null
    }
};

let timer;

// 🔊 SOUND FIX
function playSound(id){
    const audio=document.getElementById(id);
    if(audio){
        audio.currentTime=0;
        audio.play().catch(()=>{});
    }
}

function cekPNR(){

    playSound("clickSound");

    const pnr=document.getElementById("pnr").value.toUpperCase();
    const ticket=document.getElementById("ticket");

    ticket.style.display="none";

    setTimeout(()=>{
        if(dataPNR[pnr]){
            const d=dataPNR[pnr];

            document.getElementById("nama").innerText=d.nama;
            document.getElementById("kode").innerText=pnr;
            document.getElementById("rute").innerText=d.rute;
            document.getElementById("gate").innerText=d.gate;
            document.getElementById("boarding").innerText=d.boarding;
            document.getElementById("seat").innerText=d.seat;
            document.getElementById("kelas").innerText=d.kelas;
            document.getElementById("eticket").innerText=d.eticket;

            const statusEl=document.getElementById("status");
            statusEl.innerText=d.status;
            statusEl.className="status "+(d.status==="Sukses"?"success":"pending");

            ticket.style.display="block";

            playSound("successSound");

            if(timer) clearInterval(timer);
            if(d.deadline) startCountdown(d.deadline);

        }else{
            playSound("errorSound");
            alert("PNR tidak ditemukan!");
        }
    },500);
}

function startCountdown(deadline){
    const el=document.getElementById("countdown");

    timer=setInterval(()=>{
        const now=new Date().getTime();
        const end=new Date(deadline).getTime();
        const diff=end-now;

        if(diff<=0){
            el.innerText="Waktu pembayaran habis!";
            clearInterval(timer);
            return;
        }

        const h=Math.floor(diff/(1000*60*60));
        const m=Math.floor((diff%(1000*60*60))/(1000*60));
        const s=Math.floor((diff%(1000*60))/1000);

        el.innerText=`Batas bayar: ${h}j ${m}m ${s}d`;
    },1000);
}
</script>

</body>
</html>
